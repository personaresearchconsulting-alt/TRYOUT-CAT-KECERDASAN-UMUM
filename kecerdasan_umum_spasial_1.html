// === SISTEM ENGINE & NAVIGASI AUTO-NEXT ===
let currentIdx = 0;
const userAnswers = {};

// Inisialisasi Aplikasi saat Dokumen Siap
document.addEventListener("DOMContentLoaded", () => {
    renderQuiz();
    renderGridNavigation();
    showQuestion(currentIdx);
});

// Fungsi Membuat Elemen Soal ke HTML
function renderQuiz() {
    const container = document.getElementById("quizContainer");
    container.innerHTML = "";

    masterQuestions.forEach((q, index) => {
        const card = document.createElement("div");
        card.className = `question-card q-card-${index}`;
        
        const optionKeys = ['a', 'b', 'c', 'd', 'e'];
        let optionsHTML = "";
        
        optionKeys.forEach(key => {
            optionsHTML += `
                <button type="button" class="option-btn opt-${q.id}-${key}" onclick="selectOption('${q.id}', '${key}', ${index})">
                    <strong>${key.toUpperCase()}.</strong> ${q.options[key]}
                </button>
            `;
        });

        card.innerHTML = `
            <div class="question-text">Soal No. ${q.number}:</div>
            <div style="margin-bottom: 15px;">${q.text}</div>
            <div class="options-container">${optionsHTML}</div>
        `;
        container.appendChild(card);
    });
}

// Menampilkan Soal Berdasarkan Indeks Navigasi
function showQuestion(index) {
    const cards = document.querySelectorAll(".question-card");
    cards.forEach(c => c.classList.remove("active"));
    
    cards[index].classList.add("active");
    currentIdx = index;
    
    // Perbarui Teks Instruksi Subtes
    document.getElementById("mainInstruction").innerHTML = masterQuestions[index].instruction;
    
    // Sinkronisasi Progress Bar
    const total = masterQuestions.length;
    const progressPercent = Math.round(((index + 1) / total) * 100);
    document.getElementById("progressStep").innerText = `Soal ${index + 1} dari ${total}`;
    document.getElementById("progressPercent").innerText = `${progressPercent}%`;
    document.getElementById("progressFill").style.width = `${progressPercent}%`;

    // Atur Visibilitas Tombol Navigasi
    document.getElementById("prevBtn").style.display = index === 0 ? "none" : "block";
    if (index === total - 1) {
        document.getElementById("nextBtn").style.display = "none";
        document.getElementById("submitBtn").style.display = "block";
    } else {
        document.getElementById("nextBtn").style.display = "block";
        document.getElementById("submitBtn").style.display = "none";
    }

    // Update Tampilan Grid Navigasi Aktif
    updateGridUI();
}

// Fungsi Mengubah Indeks Manual (Tombol Sebelum / Selanjutnya)
function changeQuestion(step) {
    let targetIdx = currentIdx + step;
    if (targetIdx >= 0 && targetIdx < masterQuestions.length) {
        showQuestion(targetIdx);
    }
}

// Fungsi Memilih Jawaban dengan Mekanisme Auto-Next
function selectOption(questionId, selectedKey, questionIndex) {
    userAnswers[questionId] = selectedKey;
    
    // Reset status aktif tombol pilihan ganda di rumpun soal tersebut
    const options = document.querySelectorAll(`.opt-${questionId}-a, .opt-${questionId}-b, .opt-${questionId}-c, .opt-${questionId}-d, .opt-${questionId}-e`);
    options.forEach(opt => opt.classList.remove("selected"));
    
    // Aktifkan pilihan yang diklik user
    const targetOpt = document.querySelector(`.opt-${questionId}-${selectedKey}`);
    if (targetOpt) targetOpt.classList.add("selected");

    // Perbarui Grid Status (Warna Oranye karena sudah terisi)
    updateGridUI();

    // FITUR AUTO-NEXT: Pindah otomatis ke soal berikutnya setelah 800ms (0.8 detik)
    if (questionIndex < masterQuestions.length - 1) {
        setTimeout(() => {
            showQuestion(questionIndex + 1);
        }, 800);
    }
}

// === GENERATOR GRID NAVIGASI NOMOR DI BAWAH ===
function renderGridNavigation() {
    const gridContainer = document.getElementById("gridNavigation");
    gridContainer.innerHTML = "";

    masterQuestions.forEach((q, index) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = `nav-num-btn num-btn-${index}`;
        btn.innerText = q.number;
        btn.onclick = () => showQuestion(index);
        gridContainer.appendChild(btn);
    });
}

// Memperbarui Status Warna Kotak Navigasi Nomor
function updateGridUI() {
    masterQuestions.forEach((q, index) => {
        const btn = document.querySelector(`.num-btn-${index}`);
        if (btn) {
            // Hapus kelas aktif/terisi sebelumnya
            btn.classList.remove("active", "filled");

            // Jika sedang dibuka saat ini
            if (index === currentIdx) {
                btn.classList.add("active");
            }
            // Jika sudah ada jawabannya
            if (userAnswers[q.id]) {
                btn.classList.add("filled");
            }
        }
    });
}

// === KALKULASI SKOR & GENERATOR PEMBAHASAN GURU ===
function submitAnswers() {
    let totalCorrect = 0;
    const totalQuestions = masterQuestions.length;
    const recapContainer = document.getElementById("recapContainer");
    recapContainer.innerHTML = "";

    masterQuestions.forEach(q => {
        const userAns = userAnswers[q.id] || "-";
        const isCorrect = userAns.toLowerCase() === q.key.toLowerCase();
        
        if (isCorrect) totalCorrect++;

        // Membuat Kartu Pembahasan Super Rapat (Grid Anti Capek Scroll)
        const recapCard = document.createElement("div");
        recapCard.className = "recap-card";
        
        recapCard.innerHTML = `
            <div class="recap-header">
                <span>Soal No. ${q.number} (${q.number <= 126 ? "Potongan Bidang" : "Kubus 3D"})</span>
                <span style="color: ${isCorrect ? '#2ecc71' : '#e74c3c'}; font-weight: bold;">
                    ${isCorrect ? '✓ BENAR' : '✗ SALAH / KOSONG'}
                </span>
            </div>
            <div style="font-size: 13px; color: #555; margin-bottom: 4px;">
                Jawaban Anda: <strong>${userAns.toUpperCase()}</strong> | Kunci Jawaban: <strong>${q.key.toUpperCase()}</strong>
            </div>
            <div class="explanation-box">
                ${q.explanation}
            </div>
        `;
        recapContainer.appendChild(recapCard);
    });

    // Menghitung Nilai Akhir (Skor Maksimal 100)
    const finalScore = Math.round((totalCorrect / totalQuestions) * 100);
    const totalWrong = totalQuestions - totalCorrect;

    // Render Hasil Akhir ke Antarmuka
    document.getElementById("finalScore").innerText = finalScore;
    document.getElementById("scoreStats").innerText = `Benar: ${totalCorrect} | Salah: ${totalWrong} dari ${totalQuestions} Soal (Skor Maksimal: 100)`;

    // Sembunyikan Kuis, Tampilkan Hasil Akhir
    document.getElementById("quizArea").style.display = "none";
    document.getElementById("resultArea").style.display = "block";
    
    // Gulir ke Atas Halaman Hasil
    window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
