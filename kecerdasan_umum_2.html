    { id: "s2_q139", number: 139, type: "multiple-choice", key: "e", instruction: "Subtes 7 (Penalaran Analitis): Kesimpulan logis mutlak!", text: "Semua kota besar memiliki jaringan transportasi publik metro. Kota Indah tidak memiliki jaringan metro. Kesimpulan:", options: { a: "Kota Indah kota besar yang tertinggal", b: "Kota besar tidak butuh metro", c: "Semua kota memiliki metro", d: "Kota Indah akan membangun metro", e: "Kota Indah bukan kategori kota besar" }, explanation: "Modus tollens konklusif: Karena tidak punya sistem transportasi metro, Kota Indah dipastikan bukan merupakan kota besar." },
    { id: "s2_q140", number: 140, type: "multiple-choice", key: "b", instruction: "Subtes 7 (Penalaran Analitis): Kesimpulan logis mutlak!", text: "Sebagian rumah di desa berdinding kayu. Semua rumah yang berdinding kayu memiliki tungku perapian asri. Kesimpulan:", options: { a: "Semua rumah di desa bertungku perapian", b: "Sebbagian rumah di desa memiliki tungku perapian", c: "Rumah yang tidak berdinding kayu tidak bertungku", d: "Desa tersebut tidak aman dari api", e: "Rumah kayu di desa sangat rapuh" }, explanation: "Sebagian rumah di desa berdinding kayu, dan semua yang berdinding kayu bertungku, maka sebagian rumah di desa tersebut bertungku." },

    // === SUBTES 7 (SOAL TAMBAHAN BARU 141 - 150) ===
    { id: "s2_q141", number: 141, type: "multiple-choice", key: "c", instruction: "Subtes 7 (Penalaran Analitis): Kesimpulan logis mutlak!", text: "Semua pelanggar aturan disiplin akan dihukum. Anggota X terbukti melanggar aturan disiplin. Kesimpulan:", options: { a: "Anggota X dibebaskan", b: "Anggota X mengundurkan diri", c: "Anggota X akan dihukum", d: "Semua anggota dihukum", e: "Aturan disiplin diubah" }, explanation: "Karena Anggota X melanggar aturan, secara mutlak ia menerima sanksi hukuman sesuai aturan." },
    { id: "s2_q142", number: 142, type: "multiple-choice", key: "b", instruction: "Subtes 7 (Penalaran Analitis): Kesimpulan logis mutlak!", text: "Semua instrumen navigasi kapal laut membutuhkan pasokan daya listrik. Kompas magnetik mekanis tidak butuh listrik. Kesimpulan:", options: { a: "Kompas magnetik instrumen navigasi laut", b: "Kompas magnetik bukan instrumen navigasi laut berlistrik", c: "Semua kompas memakai baterai", d: "Kapal laut tidak butuh kompas", e: "Kompas magnetik rusak" }, explanation: "Sesuai pernyataan, instrumen navigasi laut modern butuh listrik. Kompas magnetik mekanis tidak butuh listrik, maka ia dikecualikan dari kelompok berdaya listrik." },
    { id: "s2_q143", number: 143, type: "multiple-choice", key: "a", instruction: "Subtes 7 (Penalaran Analitis): Kesimpulan logis mutlak!", text: "Jika komandan memberikan instruksi tertulis, serbuan dimulai. Hari ini komandan memberikan instruksi tertulis resmi. Kesimpulan:", options: { a: "Serbuan dimulai", b: "Serbuan ditunda", c: "Prajurit beristirahat", d: "Instruksi dibatalkan", e: "Komandan meninggalkan markas" }, explanation: "Modus Ponens langsung: Syarat terpenuhi (instruksi diberikan), maka tindakan akibat (serbuan dimulai) mutlak terlaksana." },
    { id: "s2_q144", number: 144, type: "multiple-choice", key: "e", instruction: "Subtes 7 (Penalaran Analitis): Kesimpulan logis mutlak!", text: "Semua jet tempur berkecepatan supersonik. Pesawat Cargo Garuda tidak berkecepatan supersonik. Kesimpulan:", options: { a: "Pesawat Cargo Garuda jet tempur lambat", b: "Semua pesawat berkecepatan supersonik", c: "Pesawat Cargo Garuda adalah jet tempur", d: "Jet tempur tidak bisa terbang lambat", e: "Pesawat Cargo Garuda bukan jet tempur" }, explanation: "Modus tollens: Karena tidak memiliki spesifikasi supersonik, Pesawat Cargo Garuda didefinisikan bukan merupakan jet tempur." },

// State Global Manajemen Aplikasi CBT
let currentQuestionIndex = 0;
const userAnswers = {}; // Menyimpan jawaban terpilih user, contoh: {0: 'a', 1: 'c'}

// 1. Fungsi Utama Render Soal
function renderQuestion() {
    const quizContainer = document.getElementById('quizContainer');
    const instructionContainer = document.getElementById('mainInstruction');
    
    if (!quizContainer || !instructionContainer) return;
    
    const q = masterQuestions[currentQuestionIndex];
    
    // Tampilkan teks instruksi subtes terkait
    instructionContainer.innerText = q.instruction || "Jawablah pertanyaan berikut dengan teliti!";
    
    // Bangun HTML Opsi Pilihan Jawaban
    let optionsHTML = '';
    for (const [key, value] of Object.entries(q.options)) {
        const isSelected = userAnswers[currentQuestionIndex] === key ? 'selected' : '';
        optionsHTML += `
            <button type="button" class="option-btn ${isSelected}" onclick="selectAnswer('${key}')">
                <span class="option-letter">${key.toUpperCase()}</span>
                <span class="option-text">${value}</span>
            </button>
        `;
    }

    // Suntik konten komponen soal ke dom container
    quizContainer.innerHTML = `
        <div class="question-card">
            <div class="question-text">Soal ${q.number}. ${q.text}</div>
            <div class="options-container">
                ${optionsHTML}
            </div>
        </div>
    `;

    // Atur visibilitas & perilaku tombol kontrol bawah
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    
    if (prevBtn) prevBtn.disabled = (currentQuestionIndex === 0);
    if (nextBtn) {
        if (currentQuestionIndex === masterQuestions.length - 1) {
            nextBtn.innerText = "Selesai Sesi";
            nextBtn.disabled = true;
            nextBtn.classList.add('hidden');
        } else {
            nextBtn.innerText = "Selanjutnya";
            nextBtn.disabled = false;
            nextBtn.classList.remove('hidden');
        }
    }

    // Sinkronisasi status progress bar dan penyorotan navigasi grid samping
    updateProgress();
    renderNavigation();
}

// 2. Fungsi Utama Render Sidebar Navigasi Grid Angka
function renderNavigation() {
    const navGrid = document.getElementById('navGrid');
    if (!navGrid) return;

    navGrid.innerHTML = ''; // Kosongkan elemen data lama

    masterQuestions.forEach((q, index) => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.innerText = q.number;
        
        // Deteksi status kelas CSS untuk pewarnaan dinamis
        let statusClass = 'unanswered';
        if (userAnswers[index] !== undefined) {
            statusClass = 'answered';
        }
        if (index === currentQuestionIndex) {
            statusClass = 'active-now';
        }

        btn.className = `grid-btn ${statusClass}`;
        btn.onclick = () => gotoQuestion(index);
        
        navGrid.appendChild(btn);
    });
}

// 3. Fungsi Logika Pemilihan Opsi Jawaban Pengguna
function selectAnswer(letterKey) {
    userAnswers[currentQuestionIndex] = letterKey;
    saveAnswer();
    
    // Otomatis refresh visual komponen kartu soal & panel nomor samping
    renderQuestion();
}

// 4. Fungsi Penyimpanan Jawaban Otomatis (Ekstensi Kesiapan Data)
function saveAnswer() {
    // Menyimpan jawaban ke memori lokal sementera (State Runtime JavaScript)
    console.log(`Jawaban disimpan untuk nomor ${currentQuestionIndex + 1}: ${userAnswers[currentQuestionIndex].toUpperCase()}`);
}

// 5. Fungsi Alur Navigasi ke Soal Selanjutnya
function nextQuestion() {
    if (currentQuestionIndex < masterQuestions.length - 1) {
        currentQuestionIndex++;
        renderQuestion();
    }
}

// 6. Fungsi Alur Navigasi ke Soal Sebelumnya
function prevQuestion() {
    if (currentQuestionIndex > 0) {
        currentQuestionIndex--;
        renderQuestion();
    }
}

// 7. Fungsi Lompat Langsung Melalui Klik Grid Navigasi Samping
function gotoQuestion(index) {
    if (index >= 0 && index < masterQuestions.length) {
        currentQuestionIndex = index;
        renderQuestion();
    }
}

// 8. Fungsi Pembaruan Status Progress Bar Aplikasi
function updateProgress() {
    const progressStep = document.getElementById('progressStep');
    const progressPercent = document.getElementById('progressPercent');
    const progressFill = document.getElementById('progressFill');

    if (!progressStep || !progressPercent || !progressFill) return;

    const total = masterQuestions.length;
    const currentDisplayNum = currentQuestionIndex + 1;
    progressStep.innerText = `Soal ${currentDisplayNum} dari ${total}`;

    // Hitung kemajuan berdasarkan akumulasi soal yang VALID telah diisi jawaban oleh user
    const answeredCount = Object.keys(userAnswers).length;
    const percentage = Math.round((answeredCount / total) * 100);
    
    progressPercent.innerText = `${percentage}% Terjawab`;
    progressFill.style.width = `${percentage}%`;
}

// 9. Fungsi Perhitungan Skor Otomatis & Distribusi Klasifikasi Hasil
function calculateScore() {
    if (!confirm('Apakah Anda yakin ingin mengakhiri sesi pengerjaan ujian simulasi ini?')) {
        return;
    }

    let correctCount = 0;
    let incorrectCount = 0;
    let unansweredCount = 0;

    masterQuestions.forEach((q, index) => {
        const ans = userAnswers[index];
        if (ans === undefined || ans === null) {
            unansweredCount++;
        } else if (ans.trim().toLowerCase() === q.key.trim().toLowerCase()) {
            correctCount++;
        } else {
            incorrectCount++;
        }
    });

    // Menghitung Nilai Berbasis Skala Persen 0 - 100
    const finalScoreValue = Math.round((correctCount / masterQuestions.length) * 100);

    // Tembak nilai kalkulasi langsung ke elemen DOM halaman hasil
    const finalScoreElem = document.getElementById('finalScore');
    const scoreStatsElem = document.getElementById('scoreStats');

    if (finalScoreElem) finalScoreElem.innerText = finalScoreValue;
    if (scoreStatsElem) {
        scoreStatsElem.innerText = `Benar: ${correctCount} | Salah: ${incorrectCount} | Kosong: ${unansweredCount} dari ${masterQuestions.length} Soal`;
    }

    // Tampilkan Hasil & Rekap Detail Evaluasi Lengkap
    showResult();
}

// 10. Fungsi Tampilkan Halaman Hasil & Render Blok Pembahasan Komprehensif
function showResult() {
    // Sembunyikan layar CBT, Munculkan Halaman Hasil Penilaian
    const quizArea = document.getElementById('quizArea');
    const resultArea = document.getElementById('resultArea');
    const recapContainer = document.getElementById('recapContainer');

    if (quizArea) quizArea.classList.add('hidden');
    if (resultArea) resultArea.style.display = 'block';
    if (!recapContainer) return;

    recapContainer.innerHTML = ''; // Reset container dari inisialisasi sampah memori lama

    masterQuestions.forEach((q, index) => {
        const uAns = userAnswers[index];
        const isCorrect = (uAns !== undefined && uAns.trim().toLowerCase() === q.key.trim().toLowerCase());
        
        let badgeHTML = '';
        if (uAns === undefined) {
            badgeHTML = '<span class="badge unanswered">Kosong</span>';
        } else if (isCorrect) {
            badgeHTML = '<span class="badge correct">Benar</span>';
        } else {
            badgeHTML = '<span class="badge wrong">Salah</span>';
        }

        const userDisplayAns = uAns ? `${uAns.toUpperCase()}. ${q.options[uAns] || ''}` : '-';
        const officialDisplayAns = `${q.key.toUpperCase()}. ${q.options[q.key]}`;

        const card = document.createElement('div');
        card.className = 'recap-card';
        card.innerHTML = `
            <div class="recap-header">
                <span>Nomor Soal ${q.number}</span>
                ${badgeHTML}
            </div>
            <div class="recap-details">
                <p><strong>Pertanyaan:</strong> ${q.text}</p>
                <p>• Jawaban Anda: <b style="color:${isCorrect ? '#2ecc71' : '#e74c3c'}">${userDisplayAns}</b></p>
                <p>• Kunci Jawaban Resmi: <b style="color:#2ecc71">${officialDisplayAns}</b></p>
            </div>
            <div class="explanation-box">
                <strong>Pembahasan Analitis:</strong> ${q.explanation}
            </div>
        `;
        recapContainer.appendChild(card);
    });

    // Otomatis arahkan pandangan viewport browser kembali ke posisi paling atas halaman hasil
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

// 11. Fungsi Pemicu Cetak Halaman window.print() Hasil Evaluasi PDF
function printResult() {
    window.print();
}

// Inisialisasi Lifecycle Aplikasi Saat DOM Siap Tanpa Crash Runtime
document.addEventListener('DOMContentLoaded', () => {
    // Tampilkan soal pertama secara default di urutan index ke-0
    renderQuestion();
});
</script>
